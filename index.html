<!DOCTYPE html>
<html>
<head>
    <title>Credit Card Approval Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>💳 Credit Card Approval Prediction</h1>

    <form action="/predict" method="POST">

        <label>Age</label>
        <input type="number" name="age" required>

        <label>Gender</label>
        <select name="gender">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>

        <label>Annual Income</label>
        <input type="number" name="income" required>

        <label>Employment Years</label>
        <input type="number" name="employment" required>

        <label>Credit Score</label>
        <input type="number" name="score" required>

        <label>Existing Loans</label>
        <input type="number" name="loans" required>

        <label>Loan Amount</label>
        <input type="number" name="loan_amount" required>

        <label>Marital Status</label>
        <select name="marital">
            <option value="Single">Single</option>
            <option value="Married">Married</option>
        </select>

        <label>Education</label>
        <select name="education">
            <option value="Graduate">Graduate</option>
            <option value="Undergraduate">Undergraduate</option>
        </select>

        <label>Property Owner</label>
        <select name="property">
            <option value="Yes">Yes</option>
            <option value="No">No</option>
        </select>

        <label>Default History</label>
        <select name="default">
            <option value="Yes">Yes</option>
            <option value="No">No</option>
        </select>

        <button type="submit">Predict</button>

    </form>

    <hr>

    <p style="text-align:center;">
        <strong>Machine Learning Project using Flask & Decision Tree</strong><br><br>
        Developed by <strong>Sannamareppagari Vasundhara</strong>
    </p>

</div>

</body>
</html>
