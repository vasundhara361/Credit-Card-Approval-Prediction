<!DOCTYPE html>
<html>
<head>
    <title>Prediction Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">
        <h1>Credit Card Approval Prediction</h1>

        {% if "Approved" in prediction %}
            <h2 style="color:green;">✅ {{ prediction }}</h2>
        {% else %}
            <h2 style="color:red;">❌ {{ prediction }}</h2>
        {% endif %}

        <br>

        <a href="/">
            <button>Predict Another Applicant</button>
        </a>

    </div>

</body>
</html>
